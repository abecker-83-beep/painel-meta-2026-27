<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Meta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Acompanhamento Meta</h1>

 <div class="termometros">
  <div class="termometro-card">
    <h3>Mês Atual</h3>
    <div class="termometro">
      <div class="termometro-fill" id="termometroMes"></div>
      <div class="termometro-bulbo"></div>
    </div>
    <p id="termometroMesTexto"></p>
  </div>

  <div class="termometro-card">
    <h3>Temporada</h3>
    <div class="termometro">
      <div class="termometro-fill" id="termometroTemporada"></div>
      <div class="termometro-bulbo"></div>
    </div>
    <p id="termometroTemporadaTexto"></p>
  </div>
</div>

  <canvas id="grafico"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>

</body>
</html>
